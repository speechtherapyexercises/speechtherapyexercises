<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Tracking | Visual Discrimination</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/tools.css">
</head>
<body class="exercise-page">

    <!-- Simple Tool Header - Matches your other games -->
    <nav class="tool-nav">
        <a href="/exercises.html" class="exit-btn">✕ Exit Game</a>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
        <div class="score-display">Stars: <span id="starCount">0</span></div>
    </nav>

    <main class="container">
        <header class="exercise-intro">
            <h1>Letter Tracking</h1>
            <p id="instructionText">Find all the matching letters!</p>
        </header>

        <!-- The Target Letter (The one they are looking for) -->
        <div id="targetArea">
            <!-- Data injected via JS -->
        </div>

        <!-- The Grid - Added 'tracking-grid' class for specific layout -->
        <section id="gameBoard" class="visual-grid tracking-grid">
            <!-- Grid of letters injected via JS -->
        </section>

        <!-- Status message for how many are left to find -->
        <div id="feedbackArea" class="feedback-text"></div>
    </main>

    <!-- Scripts -->
    <script type="module" src="../../js/exercises/letter-tracking-logic.js"></script>
</body>
</html>
