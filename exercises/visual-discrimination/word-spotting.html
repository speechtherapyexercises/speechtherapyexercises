<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Spotting - Visual Discrimination</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/tools.css">
</head>
<body class="exercise-page">

    <nav class="tool-nav">
        <div class="nav-left">
            <a href="index.html" class="back-btn">← Exit Game</a>
        </div>

        <!-- Move this out of nav-right so it sits in the middle -->
        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>

        <div class="nav-right">
            <div class="score-display">Stars: <span id="starCount">0</span></div>
        </div>
    </nav>

    <main class="container">
        <header class="exercise-intro">
            <h2>Find the Match!</h2>
            <p>Look at the word in the blue box. Can you find its twin below?</p>
        </header>

        <!-- The Target Word Display -->
        <div id="targetArea" class="word-display-box">
            <!-- Target word injected by JS -->
        </div>

        <!-- The 2x2 Word Grid -->
        <section id="gameBoard" class="visual-grid word-grid">
            <!-- Word options injected by JS -->
        </section>

        <div id="feedbackArea">
            Select the correct spelling!
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="../../js/exercises/word-spotting-logic.js"></script>
</body>
</html>
