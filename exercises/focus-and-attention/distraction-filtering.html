<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">

<body class="exercise-page">

    <!-- Navigation Area -->
    <nav class="tool-nav">
        <a href="/exercises/focus-and-attention/index.html" class="exit-btn">✕ Exit</a>

    <script type="module" src="/js/exercises/distraction-logic.js"></script>
