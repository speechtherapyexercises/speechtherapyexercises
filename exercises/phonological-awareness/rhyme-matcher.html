<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhyme Matcher | Phonological Awareness</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/tools.css">
</head>
<body class="exercise-page">

    <!-- Navigation Area -->
    <nav class="tool-nav">
        <a href="/exercises/phonological-awareness/index.html" class="exit-btn">✕ Exit</a>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
        <div class="score-display">Stars: <span id="starCount">0</span></div>
    </nav>

    <main class="container">
        <!-- Instruction Section -->
        <header class="exercise-intro">
            <h1>Rhyme Matcher</h1>
            <p id="instructionText">Find the word that rhymes!</p>
        </header>

        <!-- The Word to Match (The "King" Card) -->
        <div id="targetArea">
            <!-- JavaScript will inject the Target Icon and Name here -->
        </div>

        <!-- The Selection Area (3 Choices) -->
        <section id="gameBoard">
            <!-- JavaScript will inject 3 Choice Cards here -->
        </section>

        <!-- Dynamic Feedback Text -->
        <div id="feedbackArea"></div>
    </main>

    <!-- Logic Script -->
    <script type="module" src="/js/exercises/rhyme-logic.js"></script>
</body>
</html>
