<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllable Clapper | Phonological Awareness</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/tools.css">
</head>
<body class="exercise-page">

    <!-- Navigation Area -->
    <nav class="tool-nav">
        <a href="/exercises/phonological-awareness/index.html" class="exit-btn">✕ Exit</a>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
        <div class="score-display">Stars: <span id="starCount">0</span></div>
    </nav>

    <main class="container">
        <!-- Instruction Section -->
        <header class="exercise-intro">
            <h1>Syllable Clapper</h1>
            <p id="instructionText">How many claps (beats) do you hear?</p>
        </header>

        <!-- The word to analyze -->
        <div id="targetArea">
            <!-- JavaScript will inject Icon and Name here -->
        </div>

        <!-- Number Selection (1-4) -->
        <section id="gameBoard" class="number-grid">
            <div class="number-card" data-val="1">1</div>
            <div class="number-card" data-val="2">2</div>
            <div class="number-card" data-val="3">3</div>
            <div class="number-card" data-val="4">4</div>
        </section>

        <!-- Dynamic Feedback -->
        <div id="feedbackArea"></div>
    </main>

    <!-- Logic Scripts -->
    <script type="module" src="/js/exercises/syllable-logic.js"></script>
</body>
</html>
