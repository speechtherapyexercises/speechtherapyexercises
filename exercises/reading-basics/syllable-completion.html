<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllable Completion - Visual Discrimination</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/tools.css">
</head>
<body id="syllable-game-page" class="exercise-page">

    <nav class="tool-nav">
        <div class="nav-left">
            <a href="index.html" class="back-btn">← Exit Game</a>
        </div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
        <div class="nav-right">
            <div class="score-display">Stars: <span id="starCount">0</span></div>
        </div>
    </nav>

    <main class="container">
        <header class="exercise-intro">
            <h2>Complete the Word!</h2>
            <p>Which syllable is missing? Choose the right one to finish the word.</p>
        </header>

        <!-- The Target Display: Image on top, Word on bottom -->
        <div id="targetArea" class="word-display-box completion-layout">
            <div class="image-container">
                <img id="targetImage" src="" alt="" style="max-height: 120px; width: auto; margin-bottom: 10px; display: none;">
            </div>
            <div id="wordDisplay">
                <!-- Text like AS - [---] - NAUT injected here -->
            </div>
        </div>

        <!-- The syllable options -->
        <section id="gameBoard" class="visual-grid word-grid">
            <!-- Syllables injected by JS -->
        </section>

        <div id="feedbackArea">
            Select the correct syllable!
        </div>
    </main>

    <script type="module" src="../../js/exercises/syllable-completion-logic.js"></script>
</body>
</html>
