<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Explorer | Reading Basics</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Core Styles -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Game-Specific Styles -->
    <link rel="stylesheet" href="/css/tools.css">
</head>
<body class="exercise-page">

    <!-- Navigation Header -->
    <nav class="tool-nav">
        <a href="/exercises/reading-basics/index.html" class="exit-btn">✕ Exit</a>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%; background-color: #ff7675;"></div>
        </div>
        <div class="score-display">Stars: <span id="starCount">0</span></div>
    </nav>

    <main class="container">
        <!-- Instruction Area -->
        <header class="exercise-intro">
            <h1 style="color: #ff7675;">Sentence Explorer</h1>
            <p id="instructionText">Look at the picture and find the matching sentence!</p>
        </header>

        <!-- Target Image Container -->
        <div id="patternWrapper" class="pattern-sequence-container">
            <!-- The logic will inject the word-display-box here -->
        </div>

        <!-- Options Grid -->
        <!-- Note: We added 'text-mode' so the cards are square/rectangular for sentences -->
        <section id="gameBoard" class="visual-grid text-mode">
            <!-- Choice cards will be injected here -->
        </section>

        <!-- Feedback Message Area -->
        <div id="feedbackArea"></div>
    </main>

    <!-- Logic Scripts -->
    <script type="module" src="/js/exercises/image-sentence-logic.js"></script>
</body>
</html>
